version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./sas_converter/config:/app/sas_converter/config
      - ./output:/app/output
      - ./lancedb_data:/app/lancedb_data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
