<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 1.1 — Organisational Chart of Deloitte Tunisia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 900px; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <svg width="860" height="480" viewBox="0 0 860 480">
    <defs>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
      </filter>
    </defs>

    <!-- Title -->
    <text x="430" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#555" font-weight="500" letter-spacing="0.5">Figure 1.1 — Organisational Chart of Deloitte Tunisia</text>

    <!-- ======================== ROOT ======================== -->
    <rect x="310" y="50" width="240" height="52" rx="8" fill="#000000" filter="url(#shadow)"/>
    <text x="430" y="76" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Deloitte Tunisia</text>
    <text x="430" y="92" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25" font-weight="600" letter-spacing="1">MEMBER FIRM</text>

    <!-- Connector root → service lines -->
    <line x1="430" y1="102" x2="430" y2="135" stroke="#86BC25" stroke-width="2"/>
    <line x1="130" y1="135" x2="730" y2="135" stroke="#86BC25" stroke-width="2"/>
    <circle cx="130" cy="135" r="3" fill="#86BC25"/>
    <circle cx="310" cy="135" r="3" fill="#86BC25"/>
    <circle cx="550" cy="135" r="3" fill="#86BC25"/>
    <circle cx="730" cy="135" r="3" fill="#86BC25"/>
    <line x1="130" y1="135" x2="130" y2="158" stroke="#86BC25" stroke-width="2"/>
    <line x1="310" y1="135" x2="310" y2="158" stroke="#86BC25" stroke-width="2"/>
    <line x1="550" y1="135" x2="550" y2="158" stroke="#86BC25" stroke-width="2"/>
    <line x1="730" y1="135" x2="730" y2="158" stroke="#86BC25" stroke-width="2"/>

    <!-- ======================== SERVICE LINES ======================== -->
    <!-- Audit & Assurance -->
    <rect x="48" y="158" width="164" height="46" rx="6" fill="#1a1a1a" filter="url(#shadow)"/>
    <text x="130" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Audit &amp; Assurance</text>
    <text x="130" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Service Line</text>

    <!-- Tax & Legal -->
    <rect x="235" y="158" width="150" height="46" rx="6" fill="#1a1a1a" filter="url(#shadow)"/>
    <text x="310" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Tax &amp; Legal</text>
    <text x="310" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Service Line</text>

    <!-- Consulting -->
    <rect x="460" y="158" width="180" height="46" rx="6" fill="#1a1a1a" filter="url(#shadow)"/>
    <text x="550" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Consulting</text>
    <text x="550" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Service Line</text>

    <!-- Risk Advisory -->
    <rect x="655" y="158" width="150" height="46" rx="6" fill="#1a1a1a" filter="url(#shadow)"/>
    <text x="730" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Risk Advisory</text>
    <text x="730" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Service Line</text>

    <!-- ======================== INDUSTRIES / OFFERINGS ======================== -->
    <!-- Connector Consulting → industries -->
    <line x1="550" y1="204" x2="550" y2="240" stroke="#86BC25" stroke-width="2"/>
    <line x1="330" y1="240" x2="750" y2="240" stroke="#86BC25" stroke-width="2"/>
    <circle cx="330" cy="240" r="3" fill="#86BC25"/>
    <circle cx="550" cy="240" r="3" fill="#86BC25"/>
    <circle cx="750" cy="240" r="3" fill="#86BC25"/>
    <line x1="330" y1="240" x2="330" y2="263" stroke="#86BC25" stroke-width="2"/>
    <line x1="550" y1="240" x2="550" y2="263" stroke="#86BC25" stroke-width="2"/>
    <line x1="750" y1="240" x2="750" y2="263" stroke="#86BC25" stroke-width="2"/>

    <rect x="250" y="263" width="160" height="46" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="330" y="283" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#e0e0e0">Strategy &amp; M&amp;A</text>
    <text x="330" y="299" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Offering</text>

    <!-- TMT (highlighted) -->
    <rect x="448" y="261" width="204" height="50" rx="6" fill="#86BC25" filter="url(#shadow)"/>
    <text x="550" y="283" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#000000">TMT</text>
    <text x="550" y="299" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1a1a1a" font-weight="600">Technology, Media &amp; Telecom</text>

    <!-- Financial Services -->
    <rect x="670" y="263" width="160" height="46" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="750" y="283" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#e0e0e0">Financial Services</text>
    <text x="750" y="299" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#86BC25">Industry</text>

    <!-- ======================== DATA & AI DEPARTMENT ======================== -->
    <line x1="550" y1="311" x2="550" y2="360" stroke="#86BC25" stroke-width="2" stroke-dasharray="6,3"/>
    <circle cx="550" cy="360" r="3" fill="#86BC25"/>

    <rect x="418" y="360" width="250" height="30" rx="8" fill="#000000" stroke="#86BC25" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="550" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#86BC25">Data &amp; AI Department</text>

    <!-- ======================== LEGEND ======================== -->
    <rect x="20" y="318" width="14" height="14" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="40" y="328" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">Service Line</text>
    <rect x="20" y="340" width="14" height="14" rx="3" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
    <text x="40" y="352" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">Industry / Offering</text>
    <rect x="20" y="360" width="14" height="14" rx="3" fill="#86BC25"/>
    <text x="40" y="372" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">Host unit </text>

</body>
</html>
