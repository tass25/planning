<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:#fff; padding:12px; }
  .container { max-width:480px; margin:0 auto; }
  svg { display:block; width:100%; height:auto; }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 560 282" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-2%" y="-4%" width="104%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ── Figure caption ── -->
  <text x="280" y="16" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="11.5" fill="#555" font-weight="500" letter-spacing="0.2">
  </text>

  <!-- ══════════════════════════════════════════
       PYRAMID (bottom = widest = structural)
       Each layer: 68 px tall
       y ranges: Semantic  28–96
                 Topological 96–164
                 Structural 164–232
  ══════════════════════════════════════════ -->

  <!-- Layer 1 — STRUCTURAL (bottom) -->
  <path d="M 12,232 L 548,232 L 484,164 L 76,164 Z"
        fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#sh)"/>
  <text x="280" y="192" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="14" font-weight="700" fill="#9d174d">Structural Complexity</text>
  <text x="280" y="210" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" fill="#be185d">
    Macro meta-programming · %MACRO/%MEND · %IF/%DO · &amp;var resolution chains
  </text>

  <!-- Layer 2 — TOPOLOGICAL (middle) -->
  <path d="M 76,164 L 484,164 L 418,96 L 142,96 Z"
        fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh)"/>
  <text x="280" y="124" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="14" font-weight="700" fill="#1e40af">Topological Complexity</text>
  <text x="280" y="142" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" fill="#3b82f6">
    Cross-file dependencies · %INCLUDE chains · LIBNAME refs · SCC cycles
  </text>

  <!-- Layer 3 — SEMANTIC (top, narrowest) -->
  <path d="M 142,96 L 418,96 L 352,28 L 208,28 Z"
        fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="280" y="56" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="14" font-weight="700" fill="#065f46">Semantic Complexity</text>
  <text x="280" y="74" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" fill="#059669">
    Behavioural equivalence · SAS ≡ Python?
  </text>

  <!-- ── Complexity arrow (left side) ── -->
  <line x1="14" y1="228" x2="14" y2="32"
        stroke="#bbb" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-family="Segoe UI,sans-serif" font-size="13" fill="#aaa"
        transform="translate(14,185) rotate(-90)">complexity</text>

  <!-- ══════════════════════════════════════════
       LEGEND (compact row)
  ══════════════════════════════════════════ -->
  <rect x="44"  y="245" width="140" height="28" rx="6"
        fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="114" y="258" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" font-weight="600" fill="#9d174d">Layer 1: Structural</text>
  <text x="114" y="269" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="8.5" fill="#be185d">Macro meta-programming</text>

  <rect x="200" y="245" width="160" height="28" rx="6"
        fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="280" y="258" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" font-weight="600" fill="#1e40af">Layer 2: Topological</text>
  <text x="280" y="269" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="8.5" fill="#3b82f6">Cross-file dependencies</text>

  <rect x="376" y="245" width="140" height="28" rx="6"
        fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="446" y="258" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="10" font-weight="600" fill="#065f46">Layer 3: Semantic</text>
  <text x="446" y="269" text-anchor="middle" font-family="Segoe UI,sans-serif"
        font-size="8.5" fill="#059669">Behavioural equivalence</text>

</svg>
</div>
</body>
</html>
