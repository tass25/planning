<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 6.2 — Service Layer Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 860px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 6.2 — Service Layer: HTTP Routes Abstracted from Infrastructure</h1>
  <svg width="840" height="400" viewBox="0 0 840 400">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
    </defs>

    <!-- Top: HTTP Routes -->
    <rect x="170" y="20" width="500" height="60" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#s)"/>
    <text x="420" y="48" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1e40af">HTTP Routes (FastAPI Routers)</text>
    <text x="420" y="66" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#3b82f6">Conversions • Auth • KB • Admin • Analytics • Notifications</text>

    <!-- Arrows down to services -->
    <line x1="240" y1="80" x2="160" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="420" y1="80" x2="420" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="600" y1="80" x2="680" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Service Layer label -->
    <rect x="40" y="130" width="760" height="140" rx="16" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="420" y="152" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#065f46">Service Layer — Abstracts Infrastructure from Business Logic</text>

    <!-- BlobService -->
    <rect x="60" y="168" width="200" height="80" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2" filter="url(#s)"/>
    <text x="160" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#065f46">BlobService</text>
    <text x="160" y="214" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">File upload / download</text>
    <text x="160" y="232" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#10b981">Local fs / Azure Blob</text>

    <!-- QueueService -->
    <rect x="320" y="168" width="200" height="80" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#s)"/>
    <text x="420" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#92400e">QueueService</text>
    <text x="420" y="214" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">Async task dispatch</text>
    <text x="420" y="232" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#d97706">BackgroundTasks / Azure Queue</text>

    <!-- PipelineService -->
    <rect x="580" y="168" width="200" height="80" rx="12" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2" filter="url(#s)"/>
    <text x="680" y="194" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#9d174d">PipelineService</text>
    <text x="680" y="214" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#be185d">Pipeline orchestration</text>
    <text x="680" y="232" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#db2777">LangGraph StateGraph</text>

    <!-- Arrows down to infra -->
    <line x1="160" y1="270" x2="160" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="420" y1="270" x2="420" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="680" y1="270" x2="680" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Infrastructure boxes -->
    <rect x="60" y="320" width="200" height="60" rx="12" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2" filter="url(#s)"/>
    <text x="160" y="348" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#4338ca">Azure Blob Storage</text>
    <text x="160" y="366" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6366f1">or local filesystem</text>

    <rect x="320" y="320" width="200" height="60" rx="12" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2" filter="url(#s)"/>
    <text x="420" y="348" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#4338ca">Azure Queue</text>
    <text x="420" y="366" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6366f1">or BackgroundTasks</text>

    <rect x="580" y="320" width="200" height="60" rx="12" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2" filter="url(#s)"/>
    <text x="680" y="348" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#4338ca">LangGraph Engine</text>
    <text x="680" y="366" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6366f1">8-stage pipeline</text>
  </svg>
</div>
</body>
</html>
