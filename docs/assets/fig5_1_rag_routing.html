<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5.1 — Three-Tier RAG Routing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 860px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 5.1 — Three-Tier RAG Routing Decision Tree</h1>
  <svg width="840" height="520" viewBox="0 0 840 520">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
    </defs>

    <!-- Root: Partition -->
    <rect x="310" y="20" width="220" height="60" rx="14" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#s)"/>
    <text x="420" y="48" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#92400e">Incoming Partition</text>
    <text x="420" y="66" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">PartitionIR with risk_level + deps</text>

    <!-- Connector down -->
    <line x1="420" y1="80" x2="420" y2="110" stroke="#94a3b8" stroke-width="2"/>

    <!-- Decision: Risk Level -->
    <polygon points="420,110 520,155 420,200 320,155" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
    <text x="420" y="152" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#4338ca">risk_level?</text>
    <text x="420" y="168" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#6366f1">+ dependency check</text>

    <!-- Branch LEFT: LOW -->
    <line x1="320" y1="155" x2="150" y2="155" stroke="#94a3b8" stroke-width="2"/>
    <line x1="150" y1="155" x2="150" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="225" y="140" width="60" height="20" rx="5" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="255" y="154" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#065f46">LOW</text>

    <!-- Static RAG box -->
    <rect x="40" y="250" width="220" height="160" rx="16" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2.5" filter="url(#s)"/>
    <text x="150" y="278" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#065f46">Tier 1: Static RAG</text>
    <text x="150" y="298" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">Simple KNN retrieval</text>
    <rect x="60" y="310" width="180" height="24" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="150" y="326" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#065f46">Query → LanceDB → top-k examples</text>
    <rect x="60" y="340" width="180" height="24" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="150" y="356" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#065f46">No cross-file deps needed</text>
    <rect x="60" y="370" width="180" height="24" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="150" y="386" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#16a34a">Fast • ~0.3s retrieval</text>

    <!-- Branch MIDDLE: MODERATE + cross-file -->
    <line x1="420" y1="200" x2="420" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="355" y="205" width="130" height="20" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="420" y="219" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#1e40af">MOD + cross-file</text>

    <!-- Graph RAG box -->
    <rect x="310" y="250" width="220" height="160" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="2.5" filter="url(#s)"/>
    <text x="420" y="278" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Tier 2: Graph RAG</text>
    <text x="420" y="298" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#3b82f6">Graph-aware retrieval</text>
    <rect x="330" y="310" width="180" height="24" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="420" y="326" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e40af">NetworkX dep graph traversal</text>
    <rect x="330" y="340" width="180" height="24" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="420" y="356" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e40af">SCC member context injection</text>
    <rect x="330" y="370" width="180" height="24" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="420" y="386" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#3b82f6">Cross-file deps resolved</text>

    <!-- Branch RIGHT: HIGH / UNCERTAIN -->
    <line x1="520" y1="155" x2="690" y2="155" stroke="#94a3b8" stroke-width="2"/>
    <line x1="690" y1="155" x2="690" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="540" y="140" width="120" height="20" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
    <text x="600" y="154" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#9d174d">HIGH / UNCERTAIN</text>

    <!-- Agentic RAG box -->
    <rect x="580" y="250" width="220" height="160" rx="16" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2.5" filter="url(#s)"/>
    <text x="690" y="278" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#9d174d">Tier 3: Agentic RAG</text>
    <text x="690" y="298" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#be185d">Multi-step retrieval</text>
    <rect x="600" y="310" width="180" height="24" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="690" y="326" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#9d174d">Escalated k (more examples)</text>
    <rect x="600" y="340" width="180" height="24" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="690" y="356" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#9d174d">Iterative query refinement</text>
    <rect x="600" y="370" width="180" height="24" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="690" y="386" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#be185d">Full RAPTOR tree traversal</text>

    <!-- Escalation arrows -->
    <path d="M260,390 L310,420" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <path d="M530,390 L580,420" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Bottom: All merge to translation -->
    <line x1="150" y1="410" x2="150" y2="460" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="420" y1="410" x2="420" y2="460" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="690" y1="410" x2="690" y2="460" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="150" y1="460" x2="690" y2="460" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="420" y1="460" x2="420" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="310" y="490" width="220" height="28" rx="8" fill="#fef9c3" stroke="#fde68a" stroke-width="1.5"/>
    <text x="420" y="509" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#854d0e">→ TranslationAgent (LLM generation)</text>
  </svg>
</div>
</body>
</html>
