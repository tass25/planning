<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 4.2 — Streaming FSM: Producer–Consumer Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 900px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 4.2 — Streaming FSM: Producer–Consumer Pipeline</h1>
  <svg width="880" height="440" viewBox="0 0 880 440">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
      <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
      </marker>
    </defs>

    <!-- SAS File Input -->
    <rect x="20" y="120" width="120" height="70" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#s)"/>
    <text x="80" y="148" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#92400e">SAS File</text>
    <text x="80" y="166" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">source lines</text>

    <line x1="140" y1="155" x2="175" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- StreamAgent (Producer) -->
    <rect x="185" y="80" width="200" height="150" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#s)"/>
    <text x="285" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#1e40af">StreamAgent</text>
    <text x="285" y="126" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#3b82f6">PRODUCER</text>

    <rect x="205" y="140" width="160" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="285" y="158" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e40af">Line-by-line reader</text>

    <rect x="205" y="175" width="160" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="285" y="193" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e40af">Token emitter</text>

    <!-- Queue -->
    <line x1="385" y1="155" x2="420" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>

    <rect x="430" y="105" width="100" height="100" rx="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2.5" filter="url(#s)"/>
    <text x="480" y="140" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#4338ca">asyncio</text>
    <text x="480" y="157" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#4338ca">Queue</text>
    <text x="480" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#6366f1">backpressure</text>

    <!-- Queue to StateAgent -->
    <line x1="530" y1="155" x2="565" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>

    <!-- StateAgent (Consumer) -->
    <rect x="575" y="50" width="280" height="210" rx="16" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2" filter="url(#s)"/>
    <text x="715" y="78" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#065f46">StateAgent</text>
    <text x="715" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">CONSUMER — 23-state FSM</text>

    <!-- FSM States -->
    <rect x="595" y="108" width="80" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="635" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">IDLE</text>

    <rect x="685" y="108" width="80" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="725" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">DATA_STEP</text>

    <rect x="775" y="108" width="65" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="808" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">PROC</text>

    <rect x="595" y="142" width="80" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="635" y="159" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">MACRO</text>

    <rect x="685" y="142" width="80" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="725" y="159" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">SQL_PASS</text>

    <rect x="775" y="142" width="65" height="26" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="808" y="159" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#065f46">CARDS</text>

    <rect x="595" y="176" width="80" height="26" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="635" y="193" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#16a34a">COMMENT</text>

    <rect x="685" y="176" width="80" height="26" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="725" y="193" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#16a34a">STRING_LIT</text>

    <rect x="775" y="176" width="65" height="26" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="808" y="193" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#16a34a">+15 more</text>

    <!-- Output: PartitionIR blocks -->
    <rect x="595" y="215" width="245" height="30" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="718" y="234" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#065f46">Emit PartitionIR blocks</text>

    <!-- Output arrow -->
    <line x1="715" y1="260" x2="715" y2="300" stroke="#10b981" stroke-width="2" marker-end="url(#arrB)"/>

    <!-- Output -->
    <rect x="620" y="310" width="200" height="60" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2.5" filter="url(#s)"/>
    <text x="720" y="337" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#065f46">Partition IR Stream</text>
    <text x="720" y="355" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">→ Chunking stage</text>

    <!-- Performance annotation -->
    <rect x="20" y="300" width="280" height="100" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="160" y="324" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#374151">Performance Targets</text>
    <text x="40" y="346" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">10K-line file: &lt; 2 seconds</text>
    <text x="40" y="364" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">Peak memory: &lt; 100 MB</text>
    <text x="40" y="382" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">Backpressure: Queue bounded</text>
  </svg>
</div>
</body>
</html>
