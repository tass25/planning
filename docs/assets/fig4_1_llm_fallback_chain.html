<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 4.1 — LLM Fallback Chain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 900px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 4.1 — LLM Fallback Chain with Circuit Breakers and Rate Limiters</h1>
  <svg width="880" height="400" viewBox="0 0 880 400">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
      <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
      </marker>
      <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
      </marker>
    </defs>

    <!-- Input -->
    <rect x="20" y="140" width="110" height="70" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#s)"/>
    <text x="75" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#92400e">Translation</text>
    <text x="75" y="186" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">Request</text>

    <line x1="130" y1="175" x2="165" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Provider 1: Azure -->
    <rect x="175" y="60" width="180" height="100" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#s)"/>
    <text x="265" y="88" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Azure GPT-4o</text>
    <text x="265" y="106" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#3b82f6">PRIMARY</text>
    <rect x="195" y="115" width="70" height="20" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="230" y="129" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#1e40af">CB: 5/60s</text>
    <rect x="275" y="115" width="70" height="20" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="310" y="129" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#1e40af">RL: 10 conc</text>
    <text x="265" y="152" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#60a5fa">structured output via instructor</text>

    <!-- Arrow: try line to Azure -->
    <line x1="175" y1="155" x2="175" y2="110" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Success arrow from Azure -->
    <line x1="355" y1="110" x2="730" y2="110" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
    <text x="540" y="100" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#10b981">Success</text>

    <!-- Fail arrow from Azure to Ollama -->
    <path d="M265,160 L265,190 L380,190" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
    <text x="310" y="185" font-family="Segoe UI, sans-serif" font-size="9" fill="#ef4444">fail</text>

    <!-- Provider 2: Ollama -->
    <rect x="390" y="160" width="180" height="100" rx="14" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2" filter="url(#s)"/>
    <text x="480" y="188" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#065f46">Ollama nemotron</text>
    <text x="480" y="206" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">FALLBACK 1</text>
    <rect x="410" y="215" width="140" height="20" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="480" y="229" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#065f46">Warm standby — no circuit breaker</text>
    <text x="480" y="252" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#10b981">local inference</text>

    <!-- Success from Ollama -->
    <line x1="570" y1="210" x2="730" y2="210" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
    <text x="650" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#10b981">Success</text>

    <!-- Fail from Ollama to Groq -->
    <path d="M480,260 L480,290 L380,290" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
    <text x="440" y="282" font-family="Segoe UI, sans-serif" font-size="9" fill="#ef4444">fail</text>

    <!-- Provider 3: Groq -->
    <rect x="175" y="260" width="200" height="100" rx="14" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2" filter="url(#s)"/>
    <text x="275" y="290" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#9d174d">Groq LLaMA-3.3-70b</text>
    <text x="275" y="306" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#be185d">FALLBACK 2 + Cross-verifier</text>
    <rect x="195" y="315" width="70" height="20" rx="5" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="230" y="329" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#9d174d">CB: 3/120s</text>
    <rect x="275" y="315" width="70" height="20" rx="5" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
    <text x="310" y="329" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#9d174d">RL: 3 conc</text>
    <text x="275" y="352" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#db2777">3 API keys (GroqPool, 300K TPD)</text>

    <!-- Success from Groq -->
    <line x1="375" y1="310" x2="730" y2="310" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
    <text x="550" y="300" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#10b981">Success</text>

    <!-- Final fail to PARTIAL -->
    <path d="M275,360 L275,380 L730,380" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
    <text x="500" y="374" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#ef4444">All providers exhausted</text>

    <!-- Output box -->
    <rect x="740" y="80" width="120" height="140" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="2.5" filter="url(#s)"/>
    <text x="800" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#065f46">Translation</text>
    <text x="800" y="155" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">Output</text>
    <text x="800" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#10b981">COMPLETED</text>

    <!-- PARTIAL box -->
    <rect x="740" y="360" width="120" height="40" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="800" y="385" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#dc2626">PARTIAL</text>

    <!-- Legend -->
    <rect x="20" y="10" width="320" height="38" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="35" y1="24" x2="55" y2="24" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="28" font-family="Segoe UI, sans-serif" font-size="9" fill="#6b7280">Success path</text>
    <line x1="130" y1="24" x2="150" y2="24" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="155" y="28" font-family="Segoe UI, sans-serif" font-size="9" fill="#6b7280">Fallback on failure</text>
    <text x="250" y="28" font-family="Segoe UI, sans-serif" font-size="9" fill="#6b7280">CB = Circuit Breaker, RL = Rate Limiter</text>
  </svg>
</div>
</body>
</html>
