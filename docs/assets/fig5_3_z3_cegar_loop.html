<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5.3 — Z3 CEGAR Verification Loop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 860px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 5.3 — Z3 CEGAR Loop: SMT Verification with Counterexample-Guided Repair</h1>
  <svg width="840" height="500" viewBox="0 0 840 500">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
      <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
      </marker>
      <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
      </marker>
      <marker id="arrP" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
      </marker>
    </defs>

    <!-- Step 1: LLM Translation -->
    <rect x="40" y="60" width="200" height="80" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#s)"/>
    <text x="140" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1e40af">LLM Translation</text>
    <text x="140" y="110" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#3b82f6">SAS → Python candidate</text>
    <text x="140" y="126" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#60a5fa">via TranslationAgent</text>
    <text x="140" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#1e40af">①</text>

    <!-- Arrow to Z3 -->
    <line x1="240" y1="100" x2="310" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 2: Z3 Verify -->
    <rect x="320" y="40" width="200" height="120" rx="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2.5" filter="url(#s)"/>
    <text x="420" y="72" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#4338ca">Z3 SMT Verify</text>
    <text x="420" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6366f1">Encode SAS ≡ Python?</text>
    <text x="420" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#4338ca">②</text>

    <!-- 4 pattern encoders -->
    <rect x="340" y="105" width="80" height="20" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="380" y="119" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#6d28d9">Linear arith</text>
    <rect x="425" y="105" width="80" height="20" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="465" y="119" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#6d28d9">Bool filter</text>
    <rect x="340" y="130" width="80" height="20" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="380" y="144" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#6d28d9">Sort/dedup</text>
    <rect x="425" y="130" width="80" height="20" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="465" y="144" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#6d28d9">Assignment</text>

    <!-- Decision: SAT or UNSAT -->
    <polygon points="420,170 500,215 420,260 340,215" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="420" y="212" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#92400e">Result?</text>

    <!-- UNSAT branch (Proven correct!) -->
    <line x1="500" y1="215" x2="620" y2="215" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrG)"/>
    <text x="560" y="205" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#10b981">UNSAT</text>

    <rect x="630" y="180" width="180" height="70" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="2.5" filter="url(#s)"/>
    <text x="720" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#065f46">PROVEN ✓</text>
    <text x="720" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">No counterexample exists</text>
    <text x="720" y="244" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#10b981">Translation is correct</text>

    <!-- SAT branch (Counterexample found!) -->
    <line x1="420" y1="260" x2="420" y2="300" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrR)"/>
    <text x="445" y="285" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#ef4444">SAT</text>

    <!-- Counterexample box -->
    <rect x="310" y="310" width="220" height="70" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" filter="url(#s)"/>
    <text x="420" y="338" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#dc2626">Counterexample</text>
    <text x="420" y="356" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#ef4444">Concrete input where</text>
    <text x="420" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#ef4444">SAS ≠ Python output</text>
    <text x="420" y="300" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#dc2626">③</text>

    <!-- Arrow to CEGAR repair -->
    <line x1="310" y1="345" x2="220" y2="345" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrP)"/>

    <!-- Step 4: CEGAR Repair -->
    <rect x="40" y="300" width="170" height="90" rx="14" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#s)"/>
    <text x="125" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">CEGAR Repair</text>
    <text x="125" y="350" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7c3aed">LLM fixes translation</text>
    <text x="125" y="366" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#8b5cf6">using counterexample</text>
    <text x="125" y="378" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#8b5cf6">as targeted feedback</text>
    <text x="125" y="290" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">④</text>

    <!-- Arrow back up: Re-verify -->
    <path d="M125,300 L125,220 L320,100" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrP)"/>
    <text x="180" y="210" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">Re-verify</text>

    <!-- Max iterations note -->
    <rect x="40" y="420" width="300" height="60" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="190" y="444" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#374151">Loop Termination</text>
    <text x="190" y="462" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">UNSAT (proven) | max retries hit | timeout</text>

    <!-- Supported patterns note -->
    <rect x="500" y="310" width="300" height="80" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="650" y="334" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#374151">4 SMT Pattern Encoders</text>
    <text x="520" y="352" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">• Linear arithmetic (sums, means)</text>
    <text x="520" y="368" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">• Boolean filter (WHERE clauses)</text>
    <text x="520" y="384" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">• Sort/dedup • Variable assignment</text>
  </svg>
</div>
</body>
</html>
