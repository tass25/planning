<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 1.3 — Codara System Overview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 960px; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <svg width="930" height="370" viewBox="0 0 930 370">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
      </filter>
      <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
      </marker>
      <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="465" y="20" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#555" font-weight="500" letter-spacing="0.5">Figure 1.3 — High-Level Overview of the Codara System</text>

    <!-- ═══ INPUT ═══ -->
    <rect x="10" y="120" width="110" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
    <text x="65" y="153" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#92400e">SAS Files</text>
    <text x="65" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#b45309">.sas source code</text>

    <!-- Arrow input → pipeline -->
    <line x1="120" y1="160" x2="162" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- ═══ PIPELINE BOX — no fill, dashed border ═══ -->
    <rect x="172" y="38" width="580" height="290" rx="14" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="462" y="58" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#334155">LangGraph 8-Stage Agentic Pipeline</text>

    <!-- ═══ ROW 1: Stages 1–4 ═══ -->

    <!-- 1. File Process — Parsing group (blue) -->
    <rect x="192" y="78" width="105" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="244" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#1e40af">1. File</text>
    <text x="244" y="109" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#1e40af">Process</text>

    <line x1="297" y1="100" x2="312" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 2. Streaming — Parsing group (blue) -->
    <rect x="320" y="78" width="105" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="372" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#1e40af">2. Streaming</text>
    <text x="372" y="109" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#1e40af">FSM Parser</text>

    <line x1="425" y1="100" x2="440" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 3. Chunking — Partitioning group (violet) -->
    <rect x="448" y="78" width="105" height="44" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="500" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#6d28d9">3. Chunking</text>
    <text x="500" y="109" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#6d28d9">Boundary</text>

    <line x1="553" y1="100" x2="568" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 4. RAPTOR — Partitioning group (violet) -->
    <rect x="576" y="78" width="105" height="44" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="628" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#6d28d9">4. RAPTOR</text>
    <text x="628" y="109" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#6d28d9">Clustering</text>

    <!-- Connector row 1 → row 2 -->
    <path d="M 628,122 L 628,138 L 244,138 L 244,152" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- ═══ ROW 2: Stages 5–8 ═══ -->

    <!-- 5. Risk Routing — Routing (amber) -->
    <rect x="192" y="156" width="105" height="44" rx="8" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
    <text x="244" y="174" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#c2410c">5. Risk</text>
    <text x="244" y="187" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#c2410c">Routing</text>

    <line x1="297" y1="178" x2="312" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 6. Persist + Index — Storage (slate) -->
    <rect x="320" y="156" width="105" height="44" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="372" y="174" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#475569">6. Persist</text>
    <text x="372" y="187" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#475569">+ Index</text>

    <line x1="425" y1="178" x2="440" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 7. Translation — Translation group (green) -->
    <rect x="448" y="156" width="105" height="44" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="500" y="174" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#065f46">7. Translation</text>
    <text x="500" y="187" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#059669">3-Tier RAG</text>

    <line x1="553" y1="178" x2="568" y2="178" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrG)"/>

    <!-- 8. Merge — Translation group (green) -->
    <rect x="576" y="156" width="105" height="44" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="628" y="174" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#065f46">8. Merge</text>
    <text x="628" y="187" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#059669">+ Report</text>

    <!-- ═══ ROW 3: Verification + KB ═══ -->

    <!-- Z3 Verification (rose) -->
    <rect x="192" y="230" width="260" height="44" rx="8" fill="#ffe4e6" stroke="#fda4af" stroke-width="1.5"/>
    <text x="322" y="248" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#be123c">Z3 Verification + CEGAR Repair Loop</text>
    <text x="322" y="263" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#e11d48">SMT formal proofs · Counterexample-guided</text>

    <!-- Knowledge Base (warm yellow) -->
    <rect x="472" y="230" width="260" height="44" rx="8" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
    <text x="602" y="248" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#854d0e">Knowledge Base </text>
    <text x="602" y="263" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#a16207">LanceDB </text>

    <!-- Dashed links from verification/KB up to Translation -->
    <line x1="322" y1="230" x2="480" y2="200" stroke="#fda4af" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="602" y1="230" x2="520" y2="200" stroke="#facc15" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- ═══ PIPELINE → OUTPUT arrow ═══ -->
    <line x1="752" y1="160" x2="788" y2="160" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>

    <!-- ═══ OUTPUT ═══ -->
    <!-- Python output (green — matches translation) -->
    <rect x="798" y="95" width="120" height="56" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5" filter="url(#s)"/>
    <text x="858" y="118" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#065f46">Python</text>
    <text x="858" y="134" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#059669">Validated Output</text>

    <!-- Report output (slate — distinct from Python) -->
    <rect x="798" y="165" width="120" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#s)"/>
    <text x="858" y="188" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#334155">Report</text>
    <text x="858" y="204" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">Conversion + Quality</text>
    
  </svg>
</div>
</body>
</html>
