<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 2.2 — Canonical RAG Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 920px; width: 100%; }
  h1 { text-align: center; font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 32px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">
  <h1>Figure 2.2 — Canonical RAG Pipeline</h1>
  <svg width="900" height="320" viewBox="0 0 900 320">
    <defs>
      <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000010"/>
      </filter>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
      <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
      </marker>
    </defs>

    <!-- Step 1: Query -->
    <rect x="20" y="100" width="130" height="80" rx="14" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#s)"/>
    <text x="85" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#92400e">Query</text>
    <text x="85" y="148" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">SAS code block</text>
    <text x="85" y="163" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#b45309">to translate</text>
    <text x="85" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#92400e">① Input</text>

    <!-- Arrow -->
    <line x1="150" y1="140" x2="185" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 2: Dense Retriever -->
    <rect x="195" y="85" width="150" height="110" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#s)"/>
    <text x="270" y="115" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1e40af">Dense Retriever</text>
    <text x="270" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#3b82f6">Nomic Embed</text>
    <text x="270" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#3b82f6">768-dim vectors</text>
    <text x="270" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#60a5fa">cosine similarity</text>
    <text x="270" y="75" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#1e40af">② Embed + Search</text>

    <!-- Arrow down to KB -->
    <line x1="270" y1="195" x2="270" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>

    <!-- KB Store -->
    <rect x="195" y="240" width="150" height="60" rx="12" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2" filter="url(#s)"/>
    <text x="270" y="265" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#4338ca">KB — LanceDB</text>
    <text x="270" y="282" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6366f1">330 SAS↔Python pairs</text>

    <!-- Arrow back up from KB → Context (retrieved examples) -->
    <line x1="345" y1="258" x2="405" y2="168" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
    <text x="395" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#4338ca" font-style="italic">top-k examples</text>

    <!-- Arrow from retriever to context -->
    <line x1="345" y1="140" x2="395" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 3: Context Assembly -->
    <rect x="405" y="85" width="150" height="110" rx="14" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="2" filter="url(#s)"/>
    <text x="480" y="115" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Context</text>
    <text x="480" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7c3aed">Query + top-k</text>
    <text x="480" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7c3aed">retrieved examples</text>
    <text x="480" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#8b5cf6">Jinja2 template</text>
    <text x="480" y="75" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">③ Assemble</text>

    <!-- Arrow -->
    <line x1="555" y1="140" x2="595" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 4: Generator LLM -->
    <rect x="605" y="85" width="140" height="110" rx="14" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2" filter="url(#s)"/>
    <text x="675" y="115" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#9d174d">Generator LLM</text>
    <text x="675" y="135" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#be185d">Azure GPT-5.5</text>
    <text x="675" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#be185d">or fallback</text>
    <text x="675" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#db2777">structured output</text>
    <text x="675" y="75" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9d174d">④ Generate</text>

    <!-- Arrow -->
    <line x1="745" y1="140" x2="775" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 5: Output -->
    <rect x="785" y="100" width="100" height="80" rx="14" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2" filter="url(#s)"/>
    <text x="835" y="132" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#065f46">Python</text>
    <text x="835" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">Translation</text>
    <text x="835" y="165" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#059669">output</text>
    <text x="835" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#065f46">⑤ Output</text>

    <!-- Legend -->
    <rect x="30" y="15" width="400" height="44" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="50" y="36" font-family="Segoe UI, sans-serif" font-size="10" fill="#6b7280">Pipeline:  Query → Embed → Retrieve from KB → Assemble prompt → Generate → Python output</text>
    <text x="50" y="50" font-family="Segoe UI, sans-serif" font-size="9" fill="#9ca3af">RAG = Retrieval-Augmented Generation. Knowledge base grounds the LLM in verified translation patterns.</text>
  </svg>
</div>
</body>
</html>
