version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
    volumes:
      - ../backend/config:/app/backend/config
      - ../backend/uploads:/app/backend/uploads
      - backend_data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    # --- Azure Container Apps (HTTPS backend) ---
    # environment:
    #   - BACKEND_FQDN=ca-codara-backend.your-region.azurecontainerapps.io
    # --- Local / VM Docker Compose (HTTP backend) ---
    volumes:
      - ../deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    entrypoint: ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
