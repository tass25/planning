name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sas_converter/requirements.txt

      - name: Run unit tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd sas_converter
          python -m pytest tests/ -v \
            --tb=short \
            --junitxml=../test-results.xml \
            -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  benchmark:
    name: Gold Standard Benchmark
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sas_converter/requirements.txt

      - name: Run boundary accuracy benchmark
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT_MINI: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_MINI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd sas_converter
          python -m pytest benchmark/ -v \
            --tb=short \
            -q \
            || echo "::warning::Benchmark completed with warnings"

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t sas-converter:ci .
