version: 2

updates:
  # Python pip dependencies
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
