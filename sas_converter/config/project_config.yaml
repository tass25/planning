# Project configuration
project:
  name: sas_converter
  version: "0.1.0"
  description: "SAS-to-Python partition-based conversion pipeline"

paths:
  project_root: "."
  gold_standard: "knowledge_base/gold_standard"
  database: "file_registry.db"
  logs: "logs"

logging:
  level: INFO
  format: console  # or 'json' for production

# LLM provider defaults (overridden by env vars)
llm:
  provider: azure            # azure | groq
  max_tokens: 6000
  azure:
    api_version: "2024-10-21"
    deployment_mini: "gpt-4o-mini"
    deployment_full: "gpt-4o"
  groq:
    model: "llama-3.1-8b-instant"

# Partition pipeline defaults
pipeline:
  checkpoint_interval: 50
  parquet_threshold: 10000

# Complexity / calibration defaults
complexity:
  ece_threshold: 0.12
  success_threshold: 0.70
  kb_growth_threshold: 500
  consecutive_failures: 2

# RAPTOR semantic clustering
raptor:
  embedding_model: "nomic-ai/nomic-embed-text-v1.5"
  embedding_dim: 768
  min_cluster_size: 3
  max_cluster_depth: 3

# Index / graph defaults
graph:
  max_hop: 10

agents:
  file_analysis:
    encoding_fallback: "utf-8"
    hash_algorithm: "sha256"
  cross_file_deps:
    resolve_libname: true
    resolve_include: true
  registry_writer:
    dedup_on_hash: true
  data_lineage_extractor:
    phase: 1
    detect_reads: true
    detect_writes: true
  translation:
    crossverify_threshold: 0.85
    max_retries: 2
    target_runtime: "python"
